<!doctype html>
<html lang=pt-br>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
</head>
<body>
<main class="container">
    <div id="message-box"></div>
    <form id="login-form" method="post">
        <div>
            <label for="email-id">Email: </label>
            <input type="email" name="email" id="email-id" required>
        </div>
        <div>
            <label for="password-id">Senha: </label>
            <input type="password" name="password" id="password-id" required>
        </div>
        <button type="submit" id="login-btn">Logar</button>
    </form>
    <p>Ainda não criou uma conta? <a href="./register.html">Clique Aqui!</a></p>
</main>
<script type="module" src="js/login.js"></script>
</body>
</html>
